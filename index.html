<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS — Public Operating System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300&family=Inter:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#0000ff;--header-h:52px;}
body{font-family:'Inter','Noto Sans KR',sans-serif;background:#fff;color:#000;min-height:100vh;}
a{color:var(--blue);text-decoration:underline;text-underline-offset:2px;}
.header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#fff;display:flex;align-items:center;padding:0 28px;z-index:200;}
.logo{font-family:'Outfit',sans-serif;font-weight:200;font-size:28px;letter-spacing:0.04em;cursor:pointer;user-select:none;flex-shrink:0;}
.logo:hover{opacity:0.4;}
.nav-rail{overflow:hidden;max-width:0;transition:max-width 0.38s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;}
.nav-rail.open{max-width:600px;}
.nav-item{font-family:'Inter',sans-serif;font-size:12px;font-weight:400;letter-spacing:-0.01em;color:#999;white-space:nowrap;padding:0 20px;cursor:pointer;background:none;border:none;transition:color 0.1s;}
.nav-item:hover,.nav-item.active{color:#000;}
.nav-item.active{text-decoration:underline;text-underline-offset:3px;}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;flex-direction:column;gap:5px;margin-left:auto;}
.hamburger span{display:block;width:22px;height:1.5px;background:#000;}
.mobile-menu{display:none;position:fixed;top:var(--header-h);left:0;right:0;background:#fff;border-bottom:1px solid #000;padding:16px 28px;z-index:190;flex-direction:column;}
.mobile-menu.open{display:flex;}
.mob-item{font-size:13px;font-weight:400;letter-spacing:-0.01em;color:#999;padding:12px 0;border-bottom:1px solid #eee;cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;text-align:left;width:100%;}
.mob-item:last-child{border-bottom:none;}
.mob-item:hover,.mob-item.active{color:#000;}
@media(max-width:480px){.nav-rail{display:none !important;}.logo{pointer-events:none;}.hamburger{display:flex;}}
.site-main{margin-top:var(--header-h);padding:32px 28px 100px;}
.gallery{display:flex;flex-wrap:wrap;align-items:flex-end;gap:36px 44px;}
.card{cursor:pointer;flex-shrink:0;transition:transform 0.22s ease;}
.card:hover{transform:translateY(-6px);}
.card-cap{margin-top:10px;font-size:14.6px;font-weight:400;letter-spacing:-0.01em;line-height:1.3;}
.pg{display:none;}.pg.on{display:block;}
.tlist{list-style:none;}
.tlist li{border-bottom:1px solid #eee;padding:14px 0;display:grid;grid-template-columns:34px 1fr 90px;gap:12px;align-items:baseline;}
.tlist .num{font-size:9px;font-weight:700;color:#bbb;}
.tlist .t-title{font-size:13px;font-weight:700;color:var(--blue);text-decoration:underline;cursor:pointer;}
.tlist .t-meta{font-size:9px;color:#bbb;text-transform:uppercase;text-align:right;}
#dv{display:none;}
.d-title{font-size:20px;font-weight:400;letter-spacing:-0.01em;line-height:1.3;margin-bottom:28px;}
.d-content{width:100%;}
.d-img-main{width:100%;height:auto;display:block;margin-bottom:24px;}
.d-text{font-size:14.6px;font-weight:400;line-height:1.5;letter-spacing:-0.01em;column-width:9cm;column-count:5;column-gap:28px;}
.d-text p{break-inside:avoid;}
.d-text p+p{margin-top:14px;}
.d-img-plate{width:100%;height:auto;display:block;margin:20px 0;}
.wiki-link{color:var(--blue);text-decoration:underline;cursor:pointer;}
.d-related-label{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
.rel-item{margin-bottom:8px;font-size:12px;}
.r-sec{color:#bbb;font-size:9px;text-transform:uppercase;display:inline;margin-left:6px;}
.back-btn{display:inline-block;margin-top:48px;cursor:pointer;opacity:0.6;transition:opacity 0.15s;}
.back-btn:hover{opacity:1;}
.fab{position:fixed;bottom:24px;right:24px;width:22px;height:22px;background:#000;border:none;cursor:pointer;z-index:300;display:block;}
.fab:hover{background:var(--blue);}
.fab-edit{position:fixed;bottom:58px;right:24px;width:22px;height:22px;background:none;border:none;cursor:pointer;z-index:300;display:none;padding:0;}
.fab-edit-inner{width:22px;height:22px;background:#000;border-radius:50%;display:block;transition:background 0.15s;}
.fab-edit:hover .fab-edit-inner{background:var(--blue);}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.18);z-index:250;}
.ov.on{display:block;}
.panel{display:none;position:fixed;top:0;right:0;width:min(460px,100vw);height:100vh;background:#fff;border-left:1px solid #000;z-index:300;overflow-y:auto;padding:28px;font-size:14.6px;font-weight:400;letter-spacing:-0.01em;}
.panel.on{display:block;}
.ph{font-size:14.6px;font-weight:400;letter-spacing:-0.01em;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;}
.pc{background:none;border:none;font-size:20px;cursor:pointer;font-family:inherit;}
.fl{margin-bottom:16px;}
.fl label{display:block;font-size:12px;font-weight:400;color:#888;margin-bottom:5px;letter-spacing:-0.01em;}
.fi,.fta,.fsel{width:100%;border:1px solid #000;padding:7px 9px;font-family:inherit;font-size:14.6px;font-weight:400;letter-spacing:-0.01em;background:#fff;outline:none;}
.fi:focus,.fta:focus{border-color:var(--blue);}
.fta{height:110px;resize:vertical;}
.fbtn{background:#000;color:#fff;border:none;padding:10px 0;font-family:inherit;font-size:14.6px;font-weight:400;letter-spacing:-0.01em;cursor:pointer;width:100%;margin-top:4px;}
.fbtn:hover{background:var(--blue);}
.hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.4;}
.ok-msg{color:green;font-size:13px;margin-top:8px;display:none;}
.err-msg{color:red;font-size:13px;margin-top:8px;display:none;}
.file-row{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.deadend{display:none;position:fixed;inset:0;z-index:400;align-items:center;justify-content:center;background:rgba(0,0,0,0.15);}
.deadend.on{display:flex;}
.deadend-box{background:#fff;border:1px solid #000;padding:28px 32px;font-size:14.6px;font-weight:400;letter-spacing:-0.01em;max-width:260px;width:90%;}
.deadend-msg{margin-bottom:18px;}
.deadend-btns{display:flex;gap:16px;align-items:center;}
.deadend-build{font-size:14.6px;font-weight:400;color:var(--blue);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;letter-spacing:-0.01em;}
.deadend-close{font-size:14.6px;color:#bbb;cursor:pointer;background:none;border:none;font-family:inherit;padding:0;letter-spacing:-0.01em;}
.loading{font-size:12px;color:#bbb;padding:20px 0;}
</style>
</head>
<body>

<script>
// ════════════════════════════════════════
// ★ 여기에 본인 키를 입력하세요 ★
const SUPA_URL = 'sb_publishable_uj5BPQV8b0VGq4IxsCQa_A_7_oN_AkG';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5Ym5ncWdxaGRicGxpcW9mZWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MTExOTcsImV4cCI6MjA5MjA4NzE5N30.pcqzQpEMxh9u1iqhpCCEsrGK_LzUUWyU_gT4pd7xY2I'; // ← anon public 키로 교체
// ════════════════════════════════════════

const PW = 'pos2024';
let newUnlocked = false, editUnlocked = false;
let cur = '개념들', menuOpen = false, mobileMenuOpen = false;
let currentId = null, pendingTitle = null;
let posts = [];

/* ── SUPABASE API ── */
const headers = () => ({
  'apikey': SUPA_KEY,
  'Authorization': `Bearer ${SUPA_KEY}`,
  'Content-Type': 'application/json'
});

async function dbLoad() {
  const res = await fetch(`${SUPA_URL}/rest/v1/posts?order=created_at.asc`, { headers: headers() });
  posts = await res.json();
  renderGallery();
}

async function dbInsert(post) {
  const res = await fetch(`${SUPA_URL}/rest/v1/posts`, {
    method: 'POST',
    headers: { ...headers(), 'Prefer': 'return=representation' },
    body: JSON.stringify(post)
  });
  const rows = await res.json();
  return rows[0];
}

async function dbUpdate(id, patch) {
  await fetch(`${SUPA_URL}/rest/v1/posts?id=eq.${id}`, {
    method: 'PATCH',
    headers: headers(),
    body: JSON.stringify(patch)
  });
}

async function uploadImage(file) {
  const path = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
  const res = await fetch(`${SUPA_URL}/storage/v1/object/pos-images/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': file.type },
    body: file
  });
  if (!res.ok) return null;
  return `${SUPA_URL}/storage/v1/object/public/pos-images/${path}`;
}

/* ── NAV ── */
function toggleMenu() { menuOpen=!menuOpen; document.getElementById('nav-rail').classList.toggle('open',menuOpen); }
function toggleMobileMenu() { mobileMenuOpen=!mobileMenuOpen; document.getElementById('mobile-menu').classList.toggle('open',mobileMenuOpen); }
function closeMobileMenu() { mobileMenuOpen=false; document.getElementById('mobile-menu').classList.remove('open'); }

function go(sec) {
  closeMobileMenu();
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('dv').style.display='none';
  document.getElementById('fab-edit').style.display='none';
  document.querySelectorAll('.nav-item,.mob-item').forEach(n=>n.classList.remove('active'));
  const nv=document.getElementById('nv-'+sec); if(nv) nv.classList.add('active');
  const mob=document.getElementById('mob-'+sec); if(mob) mob.classList.add('active');
  cur=sec;
  const pg=document.getElementById('pg-'+sec);
  if(pg){ pg.classList.add('on'); if(sec==='개념들') renderGallery(); }
  window.scrollTo(0,0);
}

/* ── GALLERY ── */
function renderGallery() {
  const g=document.getElementById('gallery');
  const items=posts.filter(p=>p.sec==='개념들');
  if(!items.length){ g.innerHTML='<p class="loading">게시물이 없습니다.</p>'; return; }
  g.innerHTML=items.map(p=>{
    const thumb=p.img
      ? `<img src="${p.img}" style="width:${p.w||220}px;height:${p.h||220}px;object-fit:cover;display:block;" alt="${p.title}">`
      : `<div style="width:${p.w||220}px;height:${p.h||220}px;background:#d9d9d9;"></div>`;
    return `<div class="card" onclick="showDetail(${p.id})">${thumb}<div class="card-cap">${p.title}</div></div>`;
  }).join('');
}

/* ── DETAIL ── */
function showDetail(postId) {
  const p=posts.find(x=>x.id===postId); if(!p) return;
  currentId=postId;
  document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
  document.getElementById('dv').style.display='block';
  document.getElementById('fab-edit').style.display='flex';
  document.getElementById('d-title').textContent=p.title;
  const img=document.getElementById('d-img');
  if(p.img){ img.src=p.img; img.style.display='block'; } else { img.style.display='none'; }
  document.getElementById('d-text').innerHTML=wikiRender(p.body||'', p.plates||[]);
  const tags=p.tags||[];
  const rel=posts.filter(x=>x.id!==postId&&x.tags&&x.tags.some(t=>tags.includes(t))).slice(0,5);
  const wrap=document.getElementById('d-related-wrap');
  if(rel.length){
    wrap.style.display='block';
    document.getElementById('d-related').innerHTML=rel.map(r=>
      `<div class="rel-item"><span class="wiki-link" onclick="showDetail(${r.id})">${r.title}</span><span class="r-sec">${r.sec}</span></div>`
    ).join('');
  } else { wrap.style.display='none'; }
  window.scrollTo(0,0);
}

function closeDetail() {
  document.getElementById('dv').style.display='none';
  document.getElementById('fab-edit').style.display='none';
  currentId=null; go(cur);
}

function wikiRender(text, plates) {
  const html=text
    .replace(/\[\[image:(\d+)\]\]/g,(_,i)=>{
      const url=(plates||[])[parseInt(i)];
      return url ? `</p><img class="d-img-plate" src="${url}" alt="도판"><p>`
                 : `</p><div style="width:100%;height:200px;background:#d9d9d9;margin:20px 0;"></div><p>`;
    })
    .replace(/\[\[(.+?)\]\]/g,(_,w)=>{
      const t=posts.find(p=>p.title.includes(w)||(p.tags&&p.tags.includes(w)));
      return t
        ? `<span class="wiki-link" onclick="showDetail(${t.id})">${w}</span>`
        : `<span class="wiki-link dead-link" data-word="${w.replace(/"/g,'&quot;')}">${w}</span>`;
    })
    .replace(/\n\n/g,'</p><p style="margin-top:14px;">')
    .replace(/\n/g,'<br>');
  return `<p>${html}</p>`;
}

document.addEventListener('click', e=>{
  const el=e.target.closest('.dead-link');
  if(el) openDeadend(el.dataset.word);
});

/* ── DEAD-END ── */
let deadendWord='';
function openDeadend(w){ deadendWord=w; document.getElementById('deadend').classList.add('on'); }
function closeDeadend(){ document.getElementById('deadend').classList.remove('on'); }
function deadendBuild(){ closeDeadend(); pendingTitle=deadendWord; toggleNewPanel(); }

/* ── PANELS ── */
function closeAllPanels(){
  document.getElementById('new-panel').classList.remove('on');
  document.getElementById('edit-panel').classList.remove('on');
  document.getElementById('ov').classList.remove('on');
}

function toggleNewPanel(){
  const isOpen=document.getElementById('new-panel').classList.contains('on');
  closeAllPanels();
  if(!isOpen){
    document.getElementById('new-panel').classList.add('on');
    document.getElementById('ov').classList.add('on');
    if(newUnlocked){
      document.getElementById('npw-sc').style.display='none';
      document.getElementById('nf').style.display='block';
      if(pendingTitle){ document.getElementById('f-title').value=pendingTitle; pendingTitle=null; }
    } else {
      document.getElementById('npw-sc').style.display='block';
      document.getElementById('nf').style.display='none';
      setTimeout(()=>document.getElementById('npw-in').focus(),50);
    }
  }
}

function checkNewPw(){
  if(document.getElementById('npw-in').value===PW){
    newUnlocked=true;
    document.getElementById('npw-sc').style.display='none';
    document.getElementById('nf').style.display='block';
    document.getElementById('npw-err').style.display='none';
    if(pendingTitle){ document.getElementById('f-title').value=pendingTitle; pendingTitle=null; }
  } else {
    document.getElementById('npw-err').style.display='block';
    document.getElementById('npw-in').value='';
  }
}

async function readFile(input){
  return new Promise(resolve=>{
    const f=input.files[0]; if(!f){ resolve(null); return; }
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.readAsDataURL(f);
  });
}

async function resolveImage(fileInput, urlInput){
  const f=fileInput.files[0];
  if(f){
    // 파일이 있으면 Supabase Storage 업로드 시도, 실패 시 base64
    const uploaded=await uploadImage(f);
    if(uploaded) return uploaded;
    return await readFile(fileInput);
  }
  return urlInput.value.trim()||null;
}

async function submitNewPost(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){ alert('제목을 입력해주세요.'); return; }
  const btn=document.getElementById('nf-submit');
  btn.textContent='저장 중...'; btn.disabled=true;
  try {
    const sec=document.getElementById('f-sec').value;
    const img=await resolveImage(document.getElementById('f-img-file'), document.getElementById('f-img'));
    const plate=await resolveImage(document.getElementById('f-plate-file'), document.getElementById('f-plate'));
    const raw=document.getElementById('f-tags').value;
    const post={
      title, sec, img, plates:plate?[plate]:[], w:220, h:220,
      body:document.getElementById('f-body').value.trim(),
      tags:raw?raw.split(',').map(t=>t.trim()).filter(Boolean):[],
      date:document.getElementById('f-date').value.trim()||'',
      type:'Visual Research', status:'Published'
    };
    const saved=await dbInsert(post);
    if(saved) posts.push(saved);
    ['f-title','f-img','f-body','f-plate','f-tags','f-date'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-img-file').value='';
    document.getElementById('f-plate-file').value='';
    document.getElementById('nf-ok').style.display='block';
    setTimeout(()=>document.getElementById('nf-ok').style.display='none',2500);
    closeAllPanels(); go(sec);
  } catch(e){
    document.getElementById('nf-err').style.display='block';
    setTimeout(()=>document.getElementById('nf-err').style.display='none',3000);
  }
  btn.textContent='게시하기'; btn.disabled=false;
}

function toggleEditPanel(){
  const isOpen=document.getElementById('edit-panel').classList.contains('on');
  closeAllPanels();
  if(!isOpen){
    document.getElementById('edit-panel').classList.add('on');
    document.getElementById('ov').classList.add('on');
    if(editUnlocked){ fillEditForm(); }
    else {
      document.getElementById('epw-sc').style.display='block';
      document.getElementById('ef').style.display='none';
      setTimeout(()=>document.getElementById('epw-in').focus(),50);
    }
  }
}

function checkEditPw(){
  if(document.getElementById('epw-in').value===PW){
    editUnlocked=true;
    document.getElementById('epw-sc').style.display='none';
    document.getElementById('epw-err').style.display='none';
    fillEditForm();
  } else {
    document.getElementById('epw-err').style.display='block';
    document.getElementById('epw-in').value='';
  }
}

function fillEditForm(){
  const p=posts.find(x=>x.id===currentId); if(!p) return;
  document.getElementById('ef').style.display='block';
  document.getElementById('epw-sc').style.display='none';
  document.getElementById('e-title').value=p.title;
  document.getElementById('e-sec').value=p.sec;
  document.getElementById('e-img').value=(p.img&&!p.img.startsWith('data:'))?p.img:'';
  document.getElementById('e-body').value=p.body||'';
  document.getElementById('e-plate').value=(p.plates&&p.plates[0]&&!p.plates[0].startsWith('data:'))?p.plates[0]:'';
  document.getElementById('e-tags').value=(p.tags||[]).join(', ');
  document.getElementById('e-date').value=p.date||'';
}

async function submitEdit(){
  const p=posts.find(x=>x.id===currentId); if(!p) return;
  try {
    const img=await resolveImage(document.getElementById('e-img-file'), document.getElementById('e-img'));
    const plate=await resolveImage(document.getElementById('e-plate-file'), document.getElementById('e-plate'));
    const raw=document.getElementById('e-tags').value;
    const patch={
      title:document.getElementById('e-title').value.trim(),
      sec:document.getElementById('e-sec').value,
      img, body:document.getElementById('e-body').value.trim(),
      plates:plate?[plate]:[],
      tags:raw?raw.split(',').map(t=>t.trim()).filter(Boolean):[],
      date:document.getElementById('e-date').value.trim()
    };
    await dbUpdate(p.id, patch);
    Object.assign(p, patch);
    document.getElementById('ef-ok').style.display='block';
    setTimeout(()=>document.getElementById('ef-ok').style.display='none',2500);
    closeAllPanels(); showDetail(currentId);
  } catch(e){
    document.getElementById('ef-err').style.display='block';
    setTimeout(()=>document.getElementById('ef-err').style.display='none',3000);
  }
}
